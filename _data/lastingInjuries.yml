mutation_exceptions:
  included_injuries: [humiliated, head_injury, eye_injury, hand_injury, hobbled, spinal_injury, enfeebled]
  test:
    die: d6
    threshold: 6
    modifiers:
      - id: chaos_attacker
        label: "Lasting Injury inflicted by a fighter from a Chaos Corrupted, Helot Chaos Cults or Corpse Grinder Cult gang"
        value: 1
      - id: daemon_fighter
        label: "Lasting Injury sustained on a Daemon or daemonically possessed fighter"
        value: 1
      - id: has_mutation
        label: "Lasting Injury sustained on a fighter that already has at least one mutation"
        value: 1
  chaos_spawn:
    note: "When a fighter gains a number of mutations equal to their <b>Toughness</b>, they become a <b>Chaos Spawn</b> and are removed from the roster — <em>unless they belong to a Chaos Cult, Chaos Corrupted or Corpse Grinder Cult gang, in which case the Chaos Spawn is added to the roster immediately.</em>"
  mutations:
    humiliated:
      name: Hungering Pride
      fixedeffect: "The fighter must activate before any other fighters in their crew. If there is more than one fighter in the crew with this mutation, the controlling player may choose which one to activate first. Fighters with this mutation gain 1 additional Experience point if they take an enemy Leader or Champion Out of Action."
      colour: purple
    head_injury:
      name: Dark Madness
      fixedeffect: "The fighter must make an <b>Intelligence check</b> when they activate. If the test is failed, roll a D6 to determine their first action for this activation: 1-2 Move action, 3-4 Shoot or Fight action, 5-6 No action."
      colour: purple
    eye_injury:
      name: Bestial Senses
      fixedeffect: "The fighter cannot be included as part of a group activation, nor can they initiate a group activation if they are a Leader or Champion. The fighter counts as always being equipped with a <b>bio-scanner</b>."
      colour: purple
    hand_injury:
      name: Disturbing Appendage
      fixedeffect: "The fighter always counts as being equipped with a <b>fighting knife</b> which cannot be disarmed or destroyed. When using weapons with the <b>Unwieldy</b> trait, the fighter suffers a -1 modifier to their <b>Weapon Skill</b> or <b>Ballistic Skill</b> rolls."
      colour: purple
    hobbled:
      name: Warped Limbs
      fixedeffect: "Reduce the fighter's <b>Move</b> characteristic by 1. When the fighter makes a Charge action roll three D3, instead of one, and choose the highest to determine the distance they move."
      colour: purple
    spinal_injury:
      name: Crooked Body
      fixedeffect: "Ranged attacks made against the fighter suffer a -1 modifier to hit while within the attacking weapon's Long range. The fighter cannot wear armour of any kind – any armour they are currently equipped with may be returned to the gang's Stash."
      colour: purple
    enfeebled:
      name: Twisted Flesh
      fixedeffect: "When the fighter activates, they may remove one <b>Flesh Wound</b> from their Fighter card. The fighter cannot benefit from bio-boosters, medicae kits or assistance from other fighters when making <b>Recovery tests</b>."
      colour: purple