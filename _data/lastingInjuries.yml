#D66 roll for lasting injuries
#Into Recovery and Convalescence always set to zero.

standard_lasting_injuries:
  sides: d66
  results:
    lesson_learned:
      values: [11]
      name: Lesson Learned
      randomeffect: d3xpgain
      colour: green
    impressive_scars:
      values: [12]
      name: Impressive Scars
      fixedeffect: "Increase <b>Cool</b> by 1. This bonus only applies once, treat all further results as Out Cold."
      colour: green
    horrid_scars:
      values: [13]
      name: Horrid Scars
      fixedeffect: "Gain <b>Fearsome skill</b>. If the fighter already has the <b>Fearsome skill</b>, treat all further results as Out Cold."
      colour: green
    bitter_emnity:
      values: [14]
      name: Bitter Emnity
      fixedeffect: "When fighting a battle against the gang that inflicted this injury, the fighter gains the <b>Berserker skill</b>. If they already have the <b>Berserker skill</b> or roll this result a second time, treat it as Out Cold."
      colour: green
    out_cold:
      values: [15-26, 31-36, 41] #Extended to capture convalescence & old battle wound results as well.
      name: Out Cold
      colour: green
    partially_deafened:
      values: [42]
      name: Partially Deafened
      fixedeffect: "The fighter suffers no penalty if they are partially deafened, however, suffering this injury again reduces their <b>Leadership</b> by 1."
      colour: blue
    humiliated:
      values: [43]
      name: Humiliated
      fixedeffect: "Reduce <b>Leadership</b> and <b>Cool</b> by 1."
      colour: red
    eye_injury:
      values: [44]
      name: Eye Injury
      fixedeffect: "Reduce <b>Ballistic Skill</b> by 1."
      colour: red
    hand_injury:
      values: [45]
      name: Hand Injury
      fixedeffect: "Reduce <b>Weapon Skill</b> by 1."
      colour: red
    hobbled:
      values: [46]
      name: Hobbled
      fixedeffect: "Reduce <b>Movement</b> by 1."
      colour: red
    spinal_injury:
      values: [51]
      name: Spinal Injury
      fixedeffect: "Reduce <b>Strength</b> by 1."
      colour: red
    enfeebled:
      values: [52]
      name: Enfeebled
      fixedeffect: "Reduce <b>Toughness</b> by 1."
      colour: red
    head_injury:
      values: [53]
      name: Head Injury
      fixedeffect: "Reduce <b>Intelligence</b> and <b>Willpower</b> by 1."
      colour: red
    multiple_injuries:
      values: [54]
      name: Multiple Injuries
      randomeffect: d3multipleinjuries
    captured:
      values: [55-56]
      name: Captured
      fixedeffect: "This fighter might be captured! In the wrap-up, test to see if this fighter <b>escapes capture!</b>"
      colour: blue
    critical_injury:
      values: [61-65]
      name: Critical Injury
      fixedeffect: "Get these injuries treated in the Post Battle... or Die!"
      colour: grey
    memorable_death:
      values: [66]
      name: Memorable Death
      fixedeffect: " The fighter is killed instantly – not even the most talented Doc can save them.<br><br>If the injury was caused by an Attack action, the attacker gains 1 additional XP.<br><br>Equipment is only recovered if a friendly fighter is on the battlefield at the end of the game."
      colour: black

ironman_lasting_injuries:
  sides: 6
  results:
    out_cold:
      values: [1-3]
      name: Out Cold
      colour: green
    critical_injury:
      values: [4-5]
