      fixedeffect: " The fighter is killed instantly – not even the most talented Doc can save them.<br>If the injury was caused by an Attack action, the attacker gains 1 additional XP.<br><br>Equipment is only recovered if a friendly fighter is on the battlefield at the end of the game."
      colour: black

