id: 9_borderDispute
number: 9
name: Border Dispute

# ──────────────────────────────────────────────────────────────────────────────
# BATTLE TYPE
# ──────────────────────────────────────────────────────────────────────────────
battle_type:
  type: underhive
  restrictions:
    - >-
      <span class="text-restriction">Vehicles and wargear that grant the
      Mounted condition cannot be included</span> in either gang's starting
      crew or Reinforcements.

# ──────────────────────────────────────────────────────────────────────────────
# BATTLEFIELD
# ──────────────────────────────────────────────────────────────────────────────
battlefield:
  setup: standard

# ──────────────────────────────────────────────────────────────────────────────
# CREWS
# ──────────────────────────────────────────────────────────────────────────────
crews:
  method: Hybrid Selection
  dice: "D3+3"
  reinforcements_deck: true
# DEPLOYMENT
# ──────────────────────────────────────────────────────────────────────────────
deployment:
  steps:
    - >-
      Roll off; the winner picks one half of the battlefield as their turf.
      Draw one fighter at random from their starting crew and set up that
      fighter in their turf, <b>1" from the centre</b> of the battlefield.
      The other player does the same in the opposite half.
    - >-
      Starting with the player who set up first, players alternate setting up
      their remaining starting crew fighters using the standard deployment rules.
    - >-
      Each player places a <span class="text-keyword">gang relic</span> in
      their own turf. The relic must be set up <b>at least 5" from any
      battlefield edge</b>. It can be a generic token or a small terrain feature.

# ──────────────────────────────────────────────────────────────────────────────
# GANG TACTICS
# ──────────────────────────────────────────────────────────────────────────────
gang_tactics:
  default: none
  per_round:
    trigger: start of each round after the first
    method: randomly determine one tactic per player
  underdog:
    trigger: one player's Gang Rating is lower than their opponent's
    when: pre-battle sequence step 7
    per_credits: 100
    note: >-
      Randomly determine one gang tactic per full 100 credits of difference
      between Gang Ratings.

# ──────────────────────────────────────────────────────────────────────────────
# ENDING THE BATTLE
# ──────────────────────────────────────────────────────────────────────────────
ending:
  condition: >-
    <span class="text-trigger">If either gang has no fighters left on the
    battlefield at the end of any round</span>, the battle ends immediately.

# ──────────────────────────────────────────────────────────────────────────────
# VICTORY
# ──────────────────────────────────────────────────────────────────────────────
victory:
  winner: >-
    The gang with fighters remaining on the battlefield &mdash; not including
    <span class="text-keyword">Prone and Seriously Injured</span> fighters &mdash;
    whose <span class="text-keyword">gang relic</span> has not been defiled.
  draw: Any other result.

# ──────────────────────────────────────────────────────────────────────────────
# REWARDS
# ──────────────────────────────────────────────────────────────────────────────
rewards:
  credits:
    - condition: Gang's relic was not defiled
      roll: "D6&times;10"
      target: stash
    - condition: Gang's relic was defiled
      roll: "D3&times;10"
      target: stash

  experience:
    - condition: A fighter defiles an enemy gang's relic
      roll: D3
      target: that fighter
    - condition: Victorious gang's Leader
      roll: D3
      target: leader
      note: Regardless of whether they took part in the battle.

  reputation:
    - condition: One gang's relic was defiled and the other's was not
      changes:
        - gang: relic defiled
          amount: -D3
        - gang: relic not defiled
          amount: +D3
    - condition: Either gang bottled out
      changes:
        - gang: bottled out
          amount: -1

# ──────────────────────────────────────────────────────────────────────────────
# SPECIAL RULES
# ──────────────────────────────────────────────────────────────────────────────
special_rules:

  gang_relics:
    name: Gang Relics
    description: >-
      Add <b>+2</b> to the result of any
      <span class="text-keyword">Cool tests</span> and
      <span class="text-keyword">Leadership tests</span> made for friendly
      fighters within <b>6"</b> of their gang relic.
    bonus:
      modifier: +2
      tests: [Cool, Leadership]
      range: 6
      range_unit: '"'
      applies_to: friendly fighters

  defile_relic:
    name: Defile The Relic
    trigger_range: 1
    trigger_range_unit: '"'
    trigger_note: >-
      A fighter within <b>1"</b> of an enemy gang's relic may perform this action.
    action:
      name: Defile Relic
      type: Double
    effect: >-
      The relic is defiled by the activating fighter. Once defiled, the relic
      <span class="text-restriction">no longer offers any bonuses</span> to
      <span class="text-keyword">Cool tests</span> and
      <span class="text-keyword">Leadership tests</span>, and
      <span class="text-restriction">cannot be defiled again</span>.

  reinforcements:
    name: Reinforcements
    trigger: start of each End phase
    roll: D3
    per_player: true
    deployment: >-
      Deployed one at a time, starting with the player holding the
      <span class="text-keyword">Priority marker</span>, alternating until
      all Reinforcements are deployed.

  fleeing:
    name: Fleeing the Battlefield
    trigger: >-
      <span class="text-trigger">If either gang voluntarily bottles out and
      flees the battlefield</span>
    result: Their opponent automatically wins the scenario.
    additional: >-
      If the losing gang's relic has not been defiled, a random fighter from
      the winning gang is considered to have defiled it.
