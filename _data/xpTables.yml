      values: [3-5]
      advancement: "Random SECONDARY skill."
      ratingIncrease: 20
    random_primary_skill:
      values: [6-7]
      advancement: "Random PRIMARY skill."
      ratingIncrease: 20
    choose_primary_skill:
      values: [8-10]
      advancement: "Select PRIMARY skill."
      ratingIncrease: 20
    choose_secondary_skill:
      values: [11-12]
      advancement: "Select SECONDARY skill."
      ratingIncrease: 30

