fighter_skills:
  Agility:
    Catfall:
      number: 1
      name: Catfall
      description: |
        <p><b>Catfall:</b> <span class="text-trigger">When this fighter falls or jumps down from a ledge</span>, count the vertical distance as half (rounded up). If not <span class="text-keyword">Prone and Seriously Injured</span> or taken <span class="text-keyword">Out of Action</span> by the fall, make an <span class="text-keyword">Initiative test</span> – if passed, they remain <span class="text-keyword">Standing</span> rather than becoming <span class="text-keyword">Prone and Pinned</span>.</p>

    Clamber:
      number: 2
      name: Clamber
      description: |
        <p><b>Clamber:</b> <span class="text-trigger">When this fighter climbs</span>, their movement distance is not halved – they always count as climbing a ladder.</p>

    Dodge:
      number: 3
      name: Dodge
      description: |
        <p><b>Dodge:</b> <span class="text-trigger">If this fighter suffers a wound</span>, roll a D6. On a 6, the attack is dodged with no further effect; otherwise resolve as normal. <span class="text-trigger">Against Blast or Flame attacks</span>, a 6 allows the fighter to move up to 2" (not within 1" of an enemy) before checking if hit.</p>

    Mighty Leap:
      number: 4
      name: Mighty Leap
      description: |
        <p><b>Mighty Leap:</b> Ignore the first 2" when measuring a gap to leap across. The fighter may leap gaps of 2" plus their base size or less without an Initiative test. All other leaping rules still apply.</p>

    Spring Up:
      number: 5
      name: Spring Up
      description: |
        <p><b>Spring Up:</b> <span class="text-trigger">When activated while <span class="text-keyword">Prone and Pinned</span></span>, make an <span class="text-keyword">Initiative test</span>. If passed, the fighter may Stand Up for free. If failed, standing up still costs one action as normal.</p>

    Sprint:
      number: 6
      name: Sprint
      description: |
        <p><b>Sprint:</b> If this fighter makes two Move (Simple) actions, the second may be a Sprint – moving at double their Movement characteristic.</p>

  Brawn:
    Bull Charge:
      number: 1
      name: Bull Charge
      description: |
        <p><b>Bull Charge:</b> <span class="text-trigger">When making close combat attacks as part of a Charge (<span class="text-keyword">Double</span>) action</span>, Melee weapons gain the <span class="text-keyword">Knockback</span> trait and are resolved at <b>+1 Strength</b>.</p>

    Bulging Biceps:
      number: 2
      name: Bulging Biceps
      description: |
        <p><b>Bulging Biceps:</b> This fighter may wield an <span class="text-keyword">Unwieldy</span> weapon in one hand rather than two. <span class="text-keyword">Unwieldy</span> weapons still count as two weapons for carrying purposes.</p>

    Crushing Blow:
      number: 3
      name: Crushing Blow
      description: |
        <p><b>Crushing Blow:</b> <span class="text-trigger">Before rolling to hit</span>, nominate one attack dice as a Crushing Blow (not a <span class="text-keyword">Sidearm</span> weapon). If it hits, that attack's <b>Strength and Damage are each increased by 1</b>.</p>

    Headbutt:
      number: 4
      name: Headbutt
      description: |
        <p><b>Headbutt (Free):</b> <span class="text-trigger">While <span class="text-keyword">Standing and Engaged</span></span>, pick an enemy in base contact and roll two D6. If either result equals or exceeds their Toughness, they suffer a hit at this fighter's Strength +2, Damage 2. If both dice fail, this fighter instead suffers a hit at their own Strength, Damage 1.</p>

    Hurl:
      number: 5
      name: Hurl
      description: |
        <p><b>Hurl (Basic):</b> <span class="text-trigger">While <span class="text-keyword">Standing and Engaged</span></span>, pick an enemy in base contact (or a <span class="text-keyword">Prone and Seriously Injured</span> enemy within 1"). Make an <span class="text-keyword">Initiative test</span> for the enemy. If failed, move them D3" in any direction – if <span class="text-keyword">Standing</span>, they become <span class="text-keyword">Prone and Pinned</span>. Any model they contact suffers a Strength 3, Damage 1 hit and becomes <span class="text-keyword">Prone and Pinned</span>. Can also be performed for free after a Charge (<span class="text-keyword">Double</span>) instead of a free Fight (<span class="text-keyword">Basic</span>).</p>

    Iron Jaw:
      number: 6
      name: Iron Jaw
      description: |
        <p><b>Iron Jaw:</b> Increase this fighter's <span class="text-keyword">Toughness</span> by 2 vs. close combat weapons with <span class="text-keyword">AP -</span>.</p>

  Combat:
    Combat Master:
      number: 1
      name: Combat Master
      description: |
        <p><b>Combat Master:</b> This fighter never suffers hit roll penalties for interference and can always grant assists, regardless of how many enemies they are <span class="text-keyword">Engaged</span> with.</p>

    Counter-attack:
      number: 2
      name: Counter-attack
      description: |
        <p><b>Counter-attack:</b> <span class="text-trigger">When making Reaction attacks in close combat</span>, roll one additional Attack dice for each of the attacker's Attacks that failed to hit.</p>

    Disarm:
      number: 3
      name: Disarm
      description: |
        <p><b>Disarm:</b> All Melee weapons used by this fighter gain the <span class="text-keyword">Disarm</span> trait. If a weapon already has it, the target is disarmed on a natural 5 or 6 rather than only a 6.</p>

    Parry:
      number: 4
      name: Parry
      description: |
        <p><b>Parry:</b> This fighter can parry as though carrying a weapon with the Parry trait. If they already have one or more Parry weapons, they may parry one additional attack.</p>

    Rain of Blows:
      number: 5
      name: Rain of Blows
      description: |
        <p><b>Rain of Blows:</b> This fighter treats Fight as a <span class="text-keyword">Simple</span> action rather than <span class="text-keyword">Basic</span>, allowing two Fight (Simple) actions per <span class="text-keyword">activation</span>.</p>

    Step Aside:
      number: 6
      name: Step Aside
      description: |
        <p><b>Step Aside:</b> <span class="text-trigger">When hit in close combat</span>, make an <span class="text-keyword">Initiative test</span>. If passed, the attack misses. <span class="text-restriction">Can only be used once per enemy per round of close combat</span>.</p>

  Cunning:
    Backstab:
      number: 1
      name: Backstab
      description: |
        <p><b>Backstab:</b> All Melee weapons used by this fighter gain the <span class="text-keyword">Backstab</span> trait. If a weapon already has it, add 2 to Strength (rather than the usual 1) when the trait is triggered.</p>

    Escape Artist:
      number: 2
      name: Escape Artist
      description: |
        <p><b>Escape Artist:</b> Add 2 to the Initiative test result when making a Retreat (<span class="text-keyword">Basic</span>) action (a natural 1 still fails). If Captured and equipped with a skinblade, add 1 to the escape roll in a Rescue Mission.</p>

    Evade:
      number: 3
      name: Evade
      description: |
        <p><b>Evade:</b> <span class="text-trigger">If <span class="text-keyword">Standing and Active</span> and not in cover</span>, enemy ranged attacks against this fighter suffer an additional <span class="text-keyword">-1 to hit</span>, or <b>-2</b> if at Long range.</p>

    Infiltrate:
      number: 4
      name: Infiltrate
      description: |
        <p><b>Infiltrate:</b> <span class="text-trigger">Instead of setting up at the battle start</span>, place this fighter to one side. Immediately before round 1, deploy them anywhere not visible to enemies and not within 6" of any. If both players have Infiltrators, alternate placement starting with the roll-off winner.</p>

    Lie Low:
      number: 5
      name: Lie Low
      description: |
        <p><b>Lie Low:</b> <span class="text-trigger">While Prone</span>, enemy fighters cannot target this fighter with ranged attacks unless within the weapon's Short range. Weapons with no Short range are unaffected.</p>

    Overwatch:
      number: 6
      name: Overwatch
      description: |
        <p><b>Overwatch:</b> <span class="text-trigger">If <span class="text-keyword">Standing and Active</span> with a <span class="text-keyword">Ready marker</span></span>, this fighter may interrupt a visible enemy's declared action. They lose their <span class="text-keyword">Ready marker</span> and immediately make a Shoot (<span class="text-keyword">Basic</span>) action against that enemy. If the enemy is <span class="text-keyword">Prone and Pinned</span> or <span class="text-keyword">Seriously Injured</span> as a result, their <span class="text-keyword">activation</span> ends immediately.</p>

  Driving:
    Jink:
      number: 1
      name: Jink
      description: |
        <p><b>Jink:</b> <span class="text-trigger">Once per round, when this vehicle is hit</span>, roll a D6. On a 6+, the hit is ignored. This save <span class="text-restriction">cannot be modified by AP</span>.</p>

    Expert Driver:
      number: 2
      name: Expert Driver
      description: |
        <p><b>Expert Driver:</b> Add 1 to the result when this vehicle makes a Loss of Control test.</p>

    Heavy Foot:
      number: 3
      name: Heavy Foot
      description: |
        <p><b>Heavy Foot:</b> Once per round, when this vehicle performs a Move (Simple) or Ram (<span class="text-keyword">Double</span>) action, increase its Movement by D3". On a natural 1, the vehicle suffers a Glancing Hit to its Engine.</p>

    Slalom:
      number: 4
      name: Slalom
      description: |
        <p><b>Slalom:</b> Once per round, when this vehicle performs a Move (Simple) action, it may make one additional turn of up to 45° at any point during its move.</p>

    T-bone:
      number: 5
      name: T-bone
      description: |
        <p><b>T-bone:</b> If this vehicle has a Head-on Collision with another vehicle or terrain, add D3 to its Front Toughness for the duration of that collision.</p>

    Running Repairs:
      number: 6
      name: Running Repairs
      description: |
        <p><b>Running Repairs:</b> <span class="text-trigger">If a natural 6 is rolled on a Handling test to Restart this Stalled vehicle</span>, it also regains one lost Hull Point.</p>

  Ferocity:
    Berserker:
      number: 1
      name: Berserker
      description: |
        <p><b>Berserker:</b> <span class="text-trigger">When making close combat attacks as part of a Charge (<span class="text-keyword">Double</span>) action</span>, roll one additional Attack dice.</p>

    Fearsome:
      number: 2
      name: Fearsome
      description: |
        <p><b>Fearsome:</b> <span class="text-trigger">Any enemy wishing to Charge this fighter</span> must first pass a <span class="text-keyword">Willpower test</span>. If failed, they cannot move and their <span class="text-keyword">activation</span> ends immediately.</p>

    Impetuous:
      number: 3
      name: Impetuous
      description: |
        <p><b>Impetuous:</b> When this fighter consolidates after close combat, they may move up to 4" instead of the usual 2".</p>

    Nerves of Steel:
      number: 4
      name: Nerves of Steel
      description: |
        <p><b>Nerves of Steel:</b> <span class="text-trigger">When hit by a ranged attack</span>, make a <span class="text-keyword">Cool test</span>. If passed, the fighter may choose not to become <span class="text-keyword">Prone and Pinned</span>.</p>

    True Grit:
      number: 5
      name: True Grit
      description: |
        <p><b>True Grit:</b> <span class="text-trigger">When making an <span class="text-keyword">Injury roll</span></span>, roll 1 less Injury dice. If the fighter was rolling only 1 Injury die, roll two and the controlling player chooses which to discard.</p>

    Unstoppable:
      number: 6
      name: Unstoppable
      description: |
        <p><b>Unstoppable:</b> <span class="text-trigger">Before making a <span class="text-keyword">Recovery test</span></span>, roll 1D6; <u>on a 4+</u> the skill triggers as follows:</p>
        <ul>
          <li><span class="text-trigger">If the fighter has at least one <span class="text-keyword">Flesh Wound</span> token</span>, they may discard a single <span class="text-keyword">Flesh Wound</span> token.</li>
          <li><span class="text-trigger">If the fighter had no <span class="text-keyword">Flesh Wounds</span></span>, they instead gain an additional <b>Injury die</b> for the <span class="text-keyword">Recovery test</span>, the controlling player chooses which die to discard.</li>
        </ul>

  Leadership:
    Commanding Presence:
      number: 1
      name: Commanding Presence
      description: |
        <p><b>Commanding Presence:</b> When activating for a group activation, include one additional fighter than normal (e.g. a Champion may activate two others, a Leader three). <span class="text-restriction">Cannot be gained by a vehicle</span>.</p>

    Inspirational:
      number: 2
      name: Inspirational
      description: |
        <p><b>Inspirational:</b> <span class="text-trigger">If a friendly model within 6" fails a <span class="text-keyword">Cool test</span></span>, make a <span class="text-keyword">Leadership test</span> for this model. If passed, the Cool test also counts as passed.</p>

    Iron Will:
      number: 3
      name: Iron Will
      description: |
        <p><b>Iron Will:</b> Subtract 1 from all <span class="text-keyword">Bottle check</span> results while this model is on the battlefield and not <span class="text-keyword">Prone and Seriously Injured</span> or <span class="text-keyword">Wrecked</span>.</p>

    Mentor:
      number: 4
      name: Mentor
      description: |
        <p><b>Mentor:</b> <span class="text-trigger">Each time a friendly model within 6" gains <span class="text-keyword">XP</span></span>, make a <span class="text-keyword">Leadership test</span> for this model. If passed, that model gains 1 additional <span class="text-keyword">XP</span>.</p>

    Overseer:
      number: 5
      name: Overseer
      description: |
        <p><b>Order (Double):</b> <span class="text-trigger">If <span class="text-keyword">Standing and Active</span> or <span class="text-keyword">Mobile</span></span>, make a <span class="text-keyword">Leadership test</span>. If passed, pick a friendly fighter within 6" – they immediately make two actions as though it were their <span class="text-keyword">activation</span>, even if not <span class="text-keyword">Ready</span>. If they are <span class="text-keyword">Ready</span>, these actions do not remove their <span class="text-keyword">Ready marker</span>.</p>

    Regroup:
      number: 6
      name: Regroup
      description: |
        <p><b>Regroup:</b> <span class="text-trigger">If <span class="text-keyword">Standing and Active</span> or <span class="text-keyword">Mobile</span> at end of activation</span>, make a <span class="text-keyword">Leadership test</span>. If passed, all friendly <span class="text-keyword">Broken</span> models within 6" immediately recover from being <span class="text-keyword">Broken</span>.</p>

  Savant:
    Ballistics Expert:
      number: 1
      name: Ballistics Expert
      description: |
        <p><b>Ballistics Expert:</b> <span class="text-trigger">When making an Aim (<span class="text-keyword">Basic</span>) action</span>, make an <span class="text-keyword">Intelligence test</span>. If passed, gain an additional <span class="text-keyword">+1 to hit</span>.</p>

    Connected:
      number: 2
      name: Connected
      description: |
        <p><b>Connected:</b> This model may make an additional Trade action during the post-battle sequence (potentially two Trade actions total). Cannot be used if unable to make post-battle actions.</p>

    Fixer:
      number: 3
      name: Fixer
      description: |
        <p><b>Fixer:</b> In the Receive Rewards step, as long as this model is not Captured or In Recovery, their gang earns an additional <b>D3×10 credits</b>. They need not have fought in the battle.</p>

    Medicae:
      number: 4
      name: Medicae
      description: |
        <p><b>Treat Wounds (Basic):</b> Roll a D6. On a 3+, a friendly fighter within 1" either regains a lost <span class="text-keyword">Wound</span> or loses a Flesh Wound (controlling player's choice). <span class="text-restriction">Cannot be gained by a vehicle</span>.</p>

    Munitioneer:
      number: 5
      name: Munitioneer
      description: |
        <p><b>Munitioneer:</b> <span class="text-trigger">Whenever an Ammo test is failed for this model or a gang member within 6"</span>, it may be re-rolled.</p>

    Savvy Trader:
      number: 6
      name: Savvy Trader
      description: |
        <p><b>Savvy Trader:</b> <span class="text-trigger">When making a Trade action</span>, add 1 to the <span class="text-keyword">Availability roll</span> for <span class="text-keyword">Rare</span>/<span class="text-keyword">Illegal</span> items. Additionally, one item (not one type) may be purchased for 20 credits less on this visit.</p>

  Shooting:
    Fast Shot:
      number: 1
      name: Fast Shot
      description: |
        <p><b>Fast Shot:</b> This model treats Shoot and Fire All as <span class="text-keyword">Simple</span> actions rather than <span class="text-keyword">Basic</span>, provided they do not attack with an <span class="text-keyword">Unwieldy</span> weapon.</p>

    Gunfighter:
      number: 2
      name: Gunfighter
      description: |
        <p><b>Gunfighter:</b> <span class="text-trigger">When using <span class="text-keyword">Twin Guns Blazing</span> with two <span class="text-keyword">Sidearm</span> weapons</span>, this model does not suffer the <span class="text-keyword">-1 hit penalty</span> and may target a different enemy with each weapon.</p>

    Hip Shooting:
      number: 3
      name: Hip Shooting
      description: |
        <p><b>Hip Shooting:</b> Vehicles treat <span class="text-keyword">Move &amp; Shoot</span> as Simple (not <span class="text-keyword">Basic</span>) unless using an <span class="text-keyword">Unwieldy</span> weapon.</p>
        <p>Fighters may use: <span class="text-keyword">Run and Gun (Double)</span> – move up to double Movement then make a ranged attack at an additional <span class="text-keyword">-1 to hit</span>. <span class="text-restriction"><span class="text-keyword">Unwieldy</span> weapons cannot be used</span>.</p>

    Marksman:
      number: 4
      name: Marksman
      description: |
        <p><b>Marksman:</b> This model ignores <span class="text-keyword">Target Priority</span>. A natural 6 to hit with a non-Blast ranged weapon scores a critical hit – the weapon's <b>Damage is doubled</b> (only the first hit if Rapid Fire).</p>

    Precision Shot:
      number: 5
      name: Precision Shot
      description: |
        <p><b>Precision Shot:</b> <span class="text-trigger">If the hit roll for a non-Blast ranged attack is a natural 6</span>, the shot hits an exposed area and <span class="text-restriction">no armour save</span> can be made.</p>

    Trick Shot:
      number: 6
      name: Trick Shot
      description: |
        <p><b>Trick Shot:</b> This model suffers no hit roll penalty when the target is <span class="text-keyword">Engaged</span> or in partial cover. Against targets in full cover, the penalty is reduced to <b>-1</b> instead of -2.</p>
