<!--
  bottom-bar.html — Sticky navigation bar included at the foot of every page.

  Contains two sections:
    1. #page-roll-info  — Populated at runtime by timer.js with the latest
       dice-roll result and real-time timer display.
    2. .bottom-bar      — Icon-only navigation links to the main tool pages.
       Each link's innerHTML is set to a Phosphor icon from Icons.* via a
       single ES-module <script> that imports icons.js.
-->
<div class="page-bottom-sticky">
  <div id="page-roll-info"></div>
  <div class="bottom-bar">
    <a id="bottom-bar-home" href="{{ '/' | relative_url }}"></a>
    <a id="bottom-bar-income" href="{{ '/tools/territory.html' | relative_url }}"></a>
    <a id="bottom-bar-injuries" href="{{ '/tools/lastingInjuries.html' | relative_url }}"></a>
    <a id="bottom-bar-loot" href="{{ '/tools/lootCasket.html' | relative_url }}"></a>
    <a id="bottom-bar-xp" href="{{ '/tools/xpTables.html' | relative_url }}"></a>
    <a id="bottom-bar-sotw" href="{{ '/tools/scenario_MeatForTheGrinder.html' | relative_url }}"></a>
    <script type="module">
      import { Icons } from '{{ "/assets/js/icons.js" | relative_url }}';
      const map = { home: 'houseLine', income: 'moneyWavy', injuries: 'firstAid', loot: 'treasureChest', xp: 'militaryMedal', sotw: 'clipboardList' };
      for (const [id, icon] of Object.entries(map)) {
        document.getElementById('bottom-bar-' + id).innerHTML = Icons[icon];
      }
    </script>
  </div>
</div>
