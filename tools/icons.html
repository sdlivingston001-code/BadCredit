<!-- 
  icons.html — Developer reference page.
  Renders every icon from the Icons.* object in a clickable grid.
  Click an icon to copy its JS reference (e.g. Icons.timer) to clipboard.
  Scripts: icons.
-->

<h1>Icon Dictionary</h1>
<p>All available icons from <code>Icons.*</code> in <code>icons.js</code>.</p>

<div id="icon-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;margin-top:24px;"></div>

<script type="module">
  import { Icons } from '{{ "/assets/js/icons.js" | relative_url }}';
  const grid = document.getElementById('icon-grid');
  for (const [key, svg] of Object.entries(Icons)) {
    const card = document.createElement('div');
    card.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border:1px solid #444;border-radius:6px;text-align:center;cursor:pointer;';
    const icon = document.createElement('div');
    icon.style.cssText = 'font-size:2em;';
    icon.innerHTML = svg;
    const label = document.createElement('code');
    label.style.cssText = 'font-size:0.75em;word-break:break-all;';
    label.textContent = `Icons.${key}`;
    card.appendChild(icon);
    card.appendChild(label);
    card.title = `Click to copy: Icons.${key}`;
    card.addEventListener('click', () => {
      navigator.clipboard.writeText(`Icons.${key}`).then(() => {
        label.textContent = 'Copied!';
        setTimeout(() => label.textContent = `Icons.${key}`, 1200);
      });
    });
    grid.appendChild(card);
  }
</script>
