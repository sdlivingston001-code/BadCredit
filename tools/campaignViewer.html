<h1>Munda Manager Campaign Viewer</h1>

<p>View live data from your Necromunda campaign on Munda Manager.</p>

<div class="selector-wrapper with-divider">
  <label class="selector-label" for="campaign-id-input">Campaign ID:</label>
  <input type="text" 
         id="campaign-id-input" 
         class="select-input input-flex" 
         placeholder="e2785818-5736-4c50-bfb2-d243953541f8"
  />
  <button id="set-campaign-id" class="btn ml-10">Set Campaign</button>
</div>

<div class="flex-row-center">
  <button id="refresh-campaign" class="btn">🔄 Refresh Data</button>
  <div id="campaign-timer" class="monospace"></div>
</div>

<div id="campaign-data"></div>

<script src="{{ '/assets/js/campaignViewerEngine.js' | relative_url }}"></script>
<script src="{{ '/assets/js/campaignViewerUI.js' | relative_url }}"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    CampaignViewerUI.init("campaign-data", "refresh-campaign", "campaign-timer", "campaign-id-input", "set-campaign-id");
  });
</script>
