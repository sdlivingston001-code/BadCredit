<!-- 
  campaignViewer.html — Live viewer for Munda Manager campaign data.
  Fetches campaign JSON via CORS proxy, caches in localStorage with a
  15-min cooldown / 2-hr stale threshold, renders gang rosters and stats.
  Scripts: icons, campaignViewerEngine, campaignViewerUI.
-->

<h1>Munda Manager Campaign Viewer</h1>

<p>View live data from your Necromunda campaign on Munda Manager.</p>

<div class="selector-wrapper with-divider">
  <label class="selector-label" for="campaign-id-input">Campaign ID:</label>
  <input type="text" 
         id="campaign-id-input" 
         class="select-input input-flex" 
         placeholder="e2785818-5736-4c50-bfb2-d243953541f8"
  />
  <button id="load-campaign" class="btn ml-10">Load Campaign</button>
</div>

<div id="campaign-timer" class="monospace"></div>

<div id="campaign-data"></div>

<script type="module">
  import { CampaignViewerUI } from '{{ "/assets/js/campaignViewerUI.js" | relative_url }}';
  CampaignViewerUI.init("campaign-data", "load-campaign", "campaign-timer", "campaign-id-input");
</script>
